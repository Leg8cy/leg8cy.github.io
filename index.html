<!DOCTYPE html>
<html lang="en" oncontextmenu="return false;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas | #1 Roblox Script</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1e90ff;--blue-bright:#4dabff;--blue-dim:#0a4f99;--bg:#030d1a;--panel-border:#162b44;--text:#c8dff0;--text-dim:#4a7fa5;--text-mid:#7aaccc}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;user-select:none;-webkit-user-select:none}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(30,144,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(30,144,255,0.035) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:0}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 64px;background:rgba(3,13,26,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(30,144,255,0.1)}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 64px;gap:80px;position:relative;z-index:1}
.hero-left{flex:1;max-width:580px}
.hero-right{flex:1;display:flex;justify-content:center;align-items:center}
.ui-wrapper{position:relative;width:100%;max-width:470px;perspective:1000px}
.atlas-ui{background:rgba(8,16,28,0.97);border:1px solid rgba(30,144,255,0.35);border-radius:7px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,0.5),0 0 20px rgba(30,144,255,0.1)}
.ui-nav{height:34px;background:#0c1a2b;border-bottom:1px solid var(--panel-border);display:flex;align-items:center;padding:0 12px;justify-content:space-between}
.ui-main{display:flex;height:310px}
.ui-sidebar{width:130px;border-right:1px solid var(--panel-border);padding:10px 0}
.sidebar-item{padding:6px 16px;font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px;cursor:default}
.sidebar-item.active{color:var(--blue-bright);background:rgba(30,144,255,0.06);border-left:2px solid var(--blue)}
.ui-content{flex:1;padding:14px;display:flex;flex-direction:column;gap:10px}
.ui-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-dim)}
.ui-slider-bg{height:4px;background:#122338;border-radius:2px;margin-top:4px;position:relative;overflow:hidden}
.ui-slider-fill{position:absolute;top:0;left:0;height:100%;background:var(--blue);width:30%;transition:width 0.3s ease}
.ui-cb{width:14px;height:14px;background:#122338;border:1px solid var(--panel-border);border-radius:3px;position:relative}
.ui-cb.on::after{content:'';position:absolute;inset:2px;background:var(--blue);border-radius:1px}
</style>
</head>
<body>
<nav>
  <div style="font-weight:800;font-size:24px;letter-spacing:-0.5px">ATLAS<span style="color:var(--blue)">.</span></div>
</nav>

<section class="hero">
  <div class="hero-left">
    <h1 style="font-size:64px;line-height:1;margin-bottom:20px">The Future of <span style="color:var(--blue)">Roblox</span> Scripting.</h1>
    <p style="color:var(--text-dim);font-size:18px;margin-bottom:32px">Experience unparalleled performance and security with the industry-leading executor interface.</p>
  </div>
  <div class="hero-right">
    <div class="ui-wrapper" id="uiW">
      <div class="atlas-ui">
        <div class="ui-nav"><span style="font-size:11px;font-weight:700;color:var(--text-mid)">ATLAS V3</span></div>
        <div class="ui-main">
          <div class="ui-sidebar">
            <div class="sidebar-item active">Main</div>
            <div class="sidebar-item">Combat</div>
            <div class="sidebar-item">Visuals</div>
            <div class="sidebar-item">Misc</div>
          </div>
          <div class="ui-content">
            <div class="ui-row"><span id="l1">Walkspeed</span><div class="ui-slider-bg"><div class="ui-slider-fill" id="s1" style="width:45%"></div></div></div>
            <div class="ui-row"><span id="l2">JumpPower</span><div class="ui-slider-bg"><div class="ui-slider-fill" id="s2" style="width:30%"></div></div></div>
            <div class="ui-row"><span>Auto Farm</span><div class="ui-cb on" id="c1"></div></div>
            <div class="ui-row"><span id="l6">Kill Aura</span><div class="ui-cb" id="c6"></div></div>
            <div class="ui-row"><span id="l7">Infinite Ammo</span><div class="ui-cb" id="c7"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
/* RECONSTRUCTED INTERACTIVE LOGIC */
const sliders=[{el:document.getElementById('s1'),base:45,max:85},{el:document.getElementById('s2'),base:30,max:70}];
const cbs=[
  {cb:document.getElementById('c6'),hov:true,isBlue:false},
  {cb:document.getElementById('c7'),hov:false,isBlue:false}
];
let hovering=false;
document.getElementById('uiW').addEventListener('mouseenter',()=>{
  hovering=true;
  sliders.forEach(s=>{s.el.style.width=s.max+'%'});
  cbs.forEach((c,i)=>{setTimeout(()=>{if(hovering&&c.hov)c.cb.classList.add('on')},i*55)});
});
document.getElementById('uiW').addEventListener('mouseleave',()=>{
  hovering=false;
  sliders.forEach(s=>{s.el.style.width=s.base+'%'});
  cbs.forEach(c=>{if(!c.isBlue)c.cb.classList.remove('on')});
});
