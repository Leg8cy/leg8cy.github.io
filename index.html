<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloxRewards</title>
<style>
:root{--primary:#c084fc;--primary-dark:#a855f7;--glow:#d8b4fe;--bg-start:#05000a;--bg-end:#140022}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;background:linear-gradient(135deg,var(--bg-start),var(--bg-end));color:white;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative}
.snow-container{position:absolute;inset:0;pointer-events:none;z-index:0}
.snowflake{position:absolute;top:-12px;width:5px;height:5px;background:rgba(255,255,255,0.9);border-radius:50%;box-shadow:0 0 6px rgba(255,255,255,0.7);animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh)}}
.container{position:relative;z-index:2;width:360px;max-width:90vw;padding:40px 28px;border-radius:22px;background:rgba(255,255,255,0.03);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.05);box-shadow:0 10px 40px rgba(0,0,0,0.6);text-align:center}
h1{font-size:2.4rem;font-weight:600;margin-bottom:32px;background:linear-gradient(90deg,#e9d5ff,#c084fc,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 18px rgba(192,132,252,0.6)}
.input-group{position:relative;margin-bottom:22px}
input{width:100%;padding:14px 18px;font-size:1rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:white;transition:all 0.3s ease;backdrop-filter:blur(4px)}
input::placeholder{color:rgba(255,255,255,0.45)}
input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(192,132,252,0.25);background:rgba(255,255,255,0.08)}
.floating-label{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.5);font-size:0.95rem;pointer-events:none;transition:all 0.25s ease}
input:focus + .floating-label,input:not(:placeholder-shown) + .floating-label{top:-8px;left:14px;font-size:0.75rem;color:var(--primary);background:var(--bg-end);padding:0 5px}
button{width:100%;padding:16px;font-size:1.1rem;font-weight:600;background:linear-gradient(90deg,var(--primary),var(--primary-dark));border:none;border-radius:12px;color:white;cursor:pointer;transition:all 0.3s ease;box-shadow:0 8px 20px rgba(168,85,247,0.35);margin-top:10px}
button:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(168,85,247,0.5)}
#message{margin-top:20px;font-size:0.95rem;color:#e9d5ff;min-height:1.4em;opacity:0;transition:opacity 0.4s ease}
#message.show{opacity:1}
.particle{position:absolute;width:6px;height:6px;background:var(--glow);border-radius:50%;pointer-events:none;animation:fly 1.2s ease-out forwards}
@keyframes fly{0%{transform:translate(0,0) scale(1);opacity:0.9}100%{transform:translate(var(--x),var(--y)) scale(0.2);opacity:0}}
#cornerImg{position:fixed;bottom:18px;right:18px;width:40px;height:40px;opacity:0.8;filter:drop-shadow(0 0 10px rgba(192,132,252,0.5));z-index:10}
</style>
</head>
<body>
<div class="snow-container" id="snow"></div>
<div class="container">
<h1 id="animatedTitle">BloxRewards</h1>
<div class="input-group">
<input id="username" placeholder=" " autocomplete="off">
<span class="floating-label">Username</span>
</div>
<div class="input-group">
<input id="amount" placeholder=" " type="number" min="1" autocomplete="off">
<span class="floating-label">Amount</span>
</div>
<button id="submitBtn">Get Robux</button>
<div id="message"></div>
</div>
<img id="cornerImg" src="https://files.catbox.moe/qwz458.png" alt="logo">
<audio id="bgAudio" autoplay volume="0.3"></audio>
<script>
const snowContainer=document.getElementById("snow")
function createSnowflake(){const f=document.createElement('div');f.className='snowflake';f.style.left=Math.random()*100+'vw';f.style.animationDuration=(4+Math.random()*5)+'s';f.style.opacity=0.4+Math.random()*0.5;f.style.width=f.style.height=(4+Math.random()*5)+'px';snowContainer.appendChild(f);setTimeout(()=>f.remove(),9000)}
setInterval(createSnowflake,180)
const btn=document.getElementById("submitBtn")
const container=document.querySelector('.container')
const msg=document.getElementById("message")
let cooldown=false
function createParticles(){for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';const x=(Math.random()-0.5)*240+'px';const y=(Math.random()-1.5)*200+'px';p.style.setProperty('--x',x);p.style.setProperty('--y',y);container.appendChild(p);setTimeout(()=>p.remove(),1200)}}
btn.onclick=()=>{if(cooldown)return;const user=document.getElementById("username").value.trim();const amount=document.getElementById("amount").value.trim();if(!user||!amount||isNaN(amount)||Number(amount)<=0){msg.textContent="Enter valid details";msg.classList.add("show");setTimeout(()=>{msg.classList.remove("show");msg.textContent="";},2000);return}msg.textContent="Submitted";msg.classList.add("show");createParticles();cooldown=true;setTimeout(()=>{cooldown=false;msg.classList.remove("show");msg.textContent="";},2500)}
const titles=["BloxRewards","BloxRewards ✨","BloxRewards 💎","BloxRewards 💰"]
let tIndex=0
const animatedTitle=document.getElementById("animatedTitle")
setInterval(()=>{document.title=titles[tIndex];animatedTitle.textContent=titles[tIndex];tIndex=(tIndex+1)%titles.length},800)
const playlist=["https://files.catbox.moe/uxnh67.mp3","https://files.catbox.moe/147r3s.mp3","https://files.catbox.moe/8zzmuk.mp3","https://files.catbox.moe/kizlt0.mp3"]
let current=0
const audio=document.getElementById("bgAudio")
audio.src=playlist[current]
audio.loop=false
audio.volume=0.3
audio.play()
audio.onended=()=>{current=(current+1)%playlist.length;audio.src=playlist[current];audio.play()}
</script>
</body>
</html>
