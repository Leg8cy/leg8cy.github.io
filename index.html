html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;user-select:none;-webkit-user-select:none}

/* Corrected Hero Alignment [cite: 76] */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 64px;gap:80px}
.hero-left{flex:1;max-width:580px;display:flex;flex-direction:column;justify-content:center}
.hero-right{flex:1;display:flex;justify-content:center;align-items:center}
.ui-wrapper{position:relative;width:100%;max-width:470px}

/* Grid Positioning [cite: 77] */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(285px,1fr));gap:18px;max-width:1100px;margin:0 auto}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;max-width:1200px;margin:0 auto}
