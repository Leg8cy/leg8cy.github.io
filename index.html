
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel</title>
<style>
body{margin:0;background:#0c0c0c;font-family:monospace;color:#eaeaea}
#gate{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0c0c0c}
#box{width:360px}
input{width:100%;padding:10px;margin-top:8px;background:#0c0c0c;border:1px solid #1f1f1f;color:#eaeaea}
button{width:100%;padding:10px;margin-top:10px;background:#151515;border:1px solid #2a2a2a;color:#eaeaea;cursor:pointer}
button:hover{background:#1b1b1b}
#editor{display:none;position:absolute;inset:0;background:#111}
#top{height:32px;background:#1a1a1a;display:flex;align-items:center;padding:0 10px}
#exec{margin-left:auto;padding:6px 12px;background:#1f1f1f;border:1px solid #333;cursor:pointer}
#exec:hover{background:#2a2a2a}
#area{position:absolute;top:32px;bottom:0;left:0;right:0;background:#111;color:#dcdcdc;padding:10px;outline:none;overflow:auto;white-space:pre}
</style>
</head>
<body>

<div id="gate">
<div id="box">
<div>enter key</div>
<input id="k" placeholder="access key">
<button onclick="v()">submit</button>
</div>
</div>

<div id="editor">
<div id="top">
<div>editor</div>
<div id="exec" onclick="x()">exec</div>
</div>
<div id="area" contenteditable="true"></div>
</div>

<script>
const e=[
"QUtYLThGRkEtQ0RGLTEyM0FBLTk4N0YtQUJDRC0xMjM0NS1GRkZGRi05OTk5LUFCQ0RFRi1GRkZGRkZGRkZGRkZGRkZGRkZGRkY=",
"U0VDLVhZWjEyMy1BQkNERUYtR0hJSktMLU1OT1BRUlMtVFVWV1hZWi0xMjM0NTY3ODkwLUFCQ0RFRkdISUpLTE1OT1BRUlM=",
"WFlaLTk5OTktODg4OC03Nzc3LTY2NjYtNTU1NS00NDQ0LTMzMzMtMjIyMi0xMTExLUFCQ0RFRkdISUpLTE1OT1BRUlNUVVY=",
"R0hJSkstQUJDREVGLTEyMzQ1LTY3ODkwLUFCQ0RFRi1HSElKS0wtTU5PUFFSU1RVVldYWVo5OTk5ODg4ODc3Nzc2NjY2NTU1NQ==",
"TE9ORy1LRVktU1RSSU5HLVhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhY"
];

function d(x){return atob(x)}

function v(){
let k=document.getElementById("k").value.trim()
let ok=false
for(let i=0;i<e.length;i++){if(d(e[i])===k){ok=true}}
if(ok){
document.getElementById("gate").style.display="none"
document.getElementById("editor").style.display="block"
}
}

function x(){
let code=document.getElementById("area").innerText
try{new Function(code)()}catch(err){}
}
</script>

</body>
</html>
