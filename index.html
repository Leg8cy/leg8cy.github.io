<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legacy</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui}

body{
height:100vh;
width:100%;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;
background:transparent
}

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1
}

.profile{
display:flex;
flex-direction:column;
align-items:center;
gap:14px
}

.pfp{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover
}

.name{
font-size:32px;
font-weight:700
}

.socials{
display:flex;
gap:16px;
margin-top:10px
}

.btn{
width:52px;
height:52px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.25s
}

.btn:hover{
transform:scale(1.15)
}

.btn img{
width:30px;
height:30px
}
</style>

</head>
<body>

<canvas id="snow"></canvas>

<div class="profile">

<img class="pfp" src="https://files.catbox.moe/jmuanj.jpg">

<div class="name">Legacy</div>

<div class="socials">

<div class="btn" onclick="window.open('https://www.roblox.com/users/1331464429/profile')">
<img src="https://files.catbox.moe/2lhsiw.png">
</div>

<div class="btn" onclick="window.open('https://github.com/Leg8cy')">
<img src="https://files.catbox.moe/q7kj6j.png">
</div>

<div class="btn" onclick="navigator.clipboard.writeText('Leg8cy')">
<img src="https://files.catbox.moe/4jhg7h.png">
</div>

</div>

</div>

<script>
const canvas=document.getElementById("snow")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let snow=[]

for(let i=0;i<160;i++){
snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
speedY:Math.random()*0.8+0.3,
speedX:Math.random()*0.6+0.2
})
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="white"
ctx.beginPath()

for(let s of snow){
ctx.moveTo(s.x,s.y)
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
}

ctx.fill()

for(let s of snow){
s.y+=s.speedY
s.x-=s.speedX

if(s.y>canvas.height||s.x<0){
s.y=-5
s.x=Math.random()*canvas.width
}
}

requestAnimationFrame(draw)
}

draw()

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth
canvas.height=window.innerHeight
})
</script>

</body>
</html>
